syntax = "proto3";

package order.v1;

option go_package = "github.com/Grizzly1127/trading_matchengine/pkg/pb/order/v1;orderv1";

import "common/v1/types.proto";

service BalanceService {
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
    rpc ListBalances(ListBalancesRequest) returns (ListBalancesResponse);
    rpc UpdateBalance(UpdateBalanceRequest) returns (UpdateBalanceResponse);
}

message GetBalanceRequest {
    uint64 user_id = 1;
    string asset = 2;
}

message GetBalanceResponse {
    Balance balance = 1;
}

message ListBalancesRequest {
    uint64 user_id = 1;
}

message ListBalancesResponse {
    repeated Balance balances = 1;
}

message Balance {
    string asset = 1;
    common.v1.Decimal balance = 2;
    common.v1.Decimal frozen = 3;
    common.v1.Decimal available = 4;
}

message UpdateBalanceRequest {
    uint64 user_id = 1;
    string asset = 2;
    string business = 3;
    uint64 business_id = 4;
    common.v1.Decimal change = 5;
}

message UpdateBalanceResponse {
    Balance balance = 1;
}
