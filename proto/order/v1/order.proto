syntax = "proto3";

package order.v1;

option go_package = "github.com/Grizzly1127/trading_matchengine/pkg/pb/order/v1;orderv1";

import "google/protobuf/timestamp.proto";
import "common/v1/types.proto";

// OrderService 订单服务。
service OrderService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc ListTrades(ListTradesRequest) returns (ListTradesResponse);
}

message PlaceOrderRequest {
  uint64 user_id = 1;
  string client_order_id = 2;
  string symbol = 3;
  common.v1.Side side = 4;
  common.v1.OrderType type = 5;
  common.v1.Decimal price = 6;
  common.v1.Decimal quantity = 7;
}

message PlaceOrderResponse {
  uint64 order_id = 1;
  string client_order_id = 2;
  string symbol = 3;
  string status = 4;
  google.protobuf.Timestamp created_at = 5;
  bool idempotent_hit = 6;
}

message CancelOrderRequest {
  uint64 user_id = 1;
  uint64 order_id = 2;
}

message CancelOrderResponse {
  uint64 order_id = 1;
  string symbol = 2;
  string status = 3;
}

message GetOrderRequest {
  uint64 user_id = 1;
  uint64 order_id = 2;
}

message GetOrderResponse {
  OrderInfo order = 1;
}

message ListOrdersRequest {
  uint64 user_id = 1;
  string symbol = 2;
  common.v1.Side side = 3;
  common.v1.OrderType type = 4;
  string status = 5;
  google.protobuf.Timestamp created_at_from = 6;
  google.protobuf.Timestamp created_at_to = 7;
  int32 page = 8;
  int32 page_size = 9;
}

message ListOrdersResponse {
  repeated OrderInfo orders = 1;
}

message ListTradesRequest {
  uint64 user_id = 1;
  string symbol = 2;
  uint64 order_id = 3;
  google.protobuf.Timestamp created_at_from = 4;
  google.protobuf.Timestamp created_at_to = 5;
  int32 page = 6;
  int32 page_size = 7;
}

message TradeInfo {
  uint64 trade_id = 1;
  string symbol = 2;
  common.v1.Decimal price = 3;
  common.v1.Decimal quantity = 4;
  uint64 maker_order_id = 5;
  uint64 taker_order_id = 6;
  google.protobuf.Timestamp created_at = 7;
}

message ListTradesResponse {
  repeated TradeInfo trades = 1;
}

message OrderInfo {
  uint64 order_id = 1;
  string client_order_id = 2;
  string symbol = 3;
  common.v1.Side side = 4;
  common.v1.OrderType type = 5;
  common.v1.Decimal price = 6;
  common.v1.Decimal quantity = 7;
  common.v1.Decimal filled_quantity = 8;
  string status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}