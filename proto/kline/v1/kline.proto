syntax = "proto3";

package kline.v1;

option go_package = "github.com/Grizzly1127/trading_matchengine/pkg/pb/kline/v1;klinev1";

import "common/v1/types.proto";
import "google/protobuf/timestamp.proto";

service KlineService {
    rpc GetKlines(GetKlinesRequest) returns (GetKlinesResponse);
}

message GetKlinesRequest {
    string symbol = 1;
    string interval = 2;
    google.protobuf.Timestamp start_time = 3;
    google.protobuf.Timestamp end_time = 4;
    int32 limit = 5;
}

message GetKlinesResponse {
    repeated Kline klines = 1;
}

message Kline {
    google.protobuf.Timestamp open_time = 1;
    google.protobuf.Timestamp close_time = 2;
    common.v1.Decimal open = 3;
    common.v1.Decimal high = 4;
    common.v1.Decimal low = 5;
    common.v1.Decimal close = 6;
    common.v1.Decimal volume = 7;
    bool is_closed = 8;
}
