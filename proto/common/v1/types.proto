syntax = "proto3";
package common.v1;
option go_package = "github.com/Grizzly1127/trading_matchengine/pkg/pb/common/v1;commonv1";
import "google/protobuf/timestamp.proto";

enum Side {
    SIDE_UNSPECIFIED = 0;
    SIDE_BUY         = 1;
    SIDE_SELL        = 2;
}

enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    ORDER_TYPE_LIMIT       = 1;
    ORDER_TYPE_MARKET      = 2;
}

message Decimal {
    string value = 1;
}

message Order {
    uint64 order_id = 1;
    string client_order_id = 2;
    string symbol = 3;
    google.protobuf.Timestamp create_time = 4;
    google.protobuf.Timestamp update_time = 5;
    Side side = 6;
    OrderType type = 7;
    Decimal price = 8;
    Decimal quantity = 9;
    Decimal remaining = 10;
    uint64 flags = 11;
}

message Trade {
    uint64 trade_id = 1;
    string symbol = 2;
    google.protobuf.Timestamp create_time = 3;
    Decimal price = 4;
    Decimal quantity = 5;
    uint64 maker_order_id = 6;
    uint64 taker_order_id = 7;
}