# 统一入口：REST → Gateway，WebSocket → Push
#
# 后端默认（本机 dev.sh）:
#   gateway 127.0.0.1:8080
#   push    127.0.0.1:8081
#
# 安装示例（Ubuntu）:
#   sudo cp deploy/nginx/trading-api.conf /etc/nginx/sites-available/trading-api.conf
#   sudo ln -sf /etc/nginx/sites-available/trading-api.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 联调:
#   curl http://localhost/v1/health
#   wscat -c ws://localhost/v1/ws

upstream trading_gateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream trading_push {
    server 127.0.0.1:8081;
    keepalive 8;
}

# 开发：HTTP :80。生产请改用下方 HTTPS server 块并配置证书。
server {
    listen 80;
    listen [::]:80;
    server_name localhost api.example.com;

    # 可按需调大（批量下单、调试）
    client_max_body_size 4m;

    # WebSocket → Push（必须放在通用 location / 之前）
    location = /v1/ws {
        proxy_pass http://trading_push;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # Push 健康检查（可选，直连 push 进程）
    location = /v1/push/health {
        proxy_pass http://trading_push/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # REST → Gateway
    location / {
        proxy_pass http://trading_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

