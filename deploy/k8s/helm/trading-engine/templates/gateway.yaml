{{- if .Values.gateway.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ include "trading.namespace" . }}
  labels:
    {{- include "trading.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "trading.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: {{ include "trading.namespace" . }}
  labels:
    {{- include "trading.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  gateway.json: |
{{- .Files.Get "files/gateway.json" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ include "trading.namespace" . }}
  labels:
    {{- include "trading.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "trading.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "trading.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: gateway
          image: {{ include "trading.image" (dict "repo" .Values.gateway.image "tag" .Values.global.imageTag "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - "-config"
            - "/app/config/gateway.json"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config/gateway.json
              subPath: gateway.json
              readOnly: true
            - name: shared-config
              mountPath: /app/config/symbols.json
              subPath: symbols.json
              readOnly: true
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: gateway-config
        - name: shared-config
          configMap:
            name: {{ include "trading.fullname" . }}-shared
{{- end }}
