apiVersion: v1
kind: Service
metadata:
  name: matching-shard-0
  labels:
    app.kubernetes.io/component: matching
    trading.shard_id: shard-0
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/component: matching
    trading.shard_id: shard-0
  ports:
    - name: admin-grpc
      port: 50061
      targetPort: admin-grpc
    - name: metrics
      port: 9101
      targetPort: metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: matching-shard-0-config
  labels:
    app.kubernetes.io/component: matching
    trading.shard_id: shard-0
data:
  matching.json: |
    {
      "data_dir": "/data",
      "shard_id": "shard-0",
      "shards_file": "/app/config/shards.json",
      "snapshot_every": 10000,
      "snapshot_on_exit": true,
      "default_symbol": "BTC-USDT",
      "symbols_file": "/app/config/symbols.json",
      "metrics_listen": ":9101",
      "admin_grpc_listen": ":50061",
      "order_service": {
        "enabled": true,
        "grpc_addr": "order:50051",
        "dial_timeout_seconds": 3,
        "recovery_verify_timeout_seconds": 30
      },
      "kafka": {
        "enabled": true,
        "brokers": ["kafka:9092"],
        "group_id": "matching-shard-0",
        "command_topic": "order.commands",
        "match_topic": "match.events",
        "trade_topic": "trade.events",
        "partition": 0
      },
      "log": { "level": "info", "dev": false }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: matching-shard-0
  labels:
    app.kubernetes.io/component: matching
    trading.shard_id: shard-0
spec:
  serviceName: matching-shard-0
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/component: matching
      trading.shard_id: shard-0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: matching
        trading.shard_id: shard-0
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: matching
          image: trading/matching:dev
          imagePullPolicy: IfNotPresent
          args: ["-config", "/app/config/matching.json"]
          ports:
            - name: admin-grpc
              containerPort: 50061
            - name: metrics
              containerPort: 9101
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /app/config/matching.json
              subPath: matching.json
              readOnly: true
            - name: shared-config
              mountPath: /app/config/symbols.json
              subPath: symbols.json
              readOnly: true
            - name: shared-config
              mountPath: /app/config/shards.json
              subPath: shards.json
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: matching-shard-0-config
        - name: shared-config
          configMap:
            name: trading-shared
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/component: matching
          trading.shard_id: shard-0
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
